name: Build App

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App directory to build (e.g. shell, apps/echo-jot)'
        required: true
        default: 'shell'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute artifact slug
        id: slug
        working-directory: .
        run: echo "slug=$(echo '${{ inputs.app }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Set up release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No keystore secret — building with debug signing."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Accept Android SDK licenses
        working-directory: .
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Prepare assets
        run: |
          if [ -f prepare_assets.sh ]; then bash prepare_assets.sh; fi

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - run: flutter build apk --release

      - run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-apk
          path: ${{ inputs.app }}/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-aab
          path: ${{ inputs.app }}/build/app/outputs/bundle/release/app-release.aab
